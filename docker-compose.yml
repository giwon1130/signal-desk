services:
  signal-desk-postgres:
    image: postgres:16-alpine
    container_name: signal-desk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: signaldesk
      POSTGRES_USER: signaldesk
      POSTGRES_PASSWORD: signaldesk
    volumes:
      - signal-desk-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signaldesk -d signaldesk"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5491:5432"

  signal-desk-api:
    build:
      context: ../signal-desk-api
    container_name: signal-desk-api
    restart: unless-stopped
    environment:
      SIGNAL_DESK_STORE_MODE: jdbc
      SIGNAL_DESK_STORE_JDBC_URL: jdbc:postgresql://signal-desk-postgres:5432/signaldesk
      SIGNAL_DESK_STORE_JDBC_USERNAME: signaldesk
      SIGNAL_DESK_STORE_JDBC_PASSWORD: signaldesk
    depends_on:
      signal-desk-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8091/api/v1/market/summary >/dev/null || exit 1"]
      interval: 15s
      timeout: 8s
      retries: 10
      start_period: 30s
    ports:
      - "8091:8091"

  signal-desk-web:
    build:
      context: ../signal-desk-web
    container_name: signal-desk-web
    restart: unless-stopped
    ports:
      - "4180:80"
    depends_on:
      signal-desk-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  signal-desk-postgres-data:
